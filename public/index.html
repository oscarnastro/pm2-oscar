<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM2 Oscar Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <header class="navbar glass-card">
      <div class="brand">
        <i data-lucide="activity"></i>
        <span>PM2 Oscar</span>
      </div>
      <button id="logout" class="btn">Logout</button>
    </header>

    <main class="container">
      <section class="panel glass-card">
        <div class="toolbar">
          <h2>Processi</h2>
          <button id="refresh" class="btn">Refresh</button>
        </div>
        <div id="process-list" class="process-grid"></div>
      </section>

      <section class="panel glass-card logs-panel">
        <div class="toolbar">
          <h2>Log viewer</h2>
          <select id="tail-lines">
            <option value="50">50 righe</option>
            <option value="100" selected>100 righe</option>
            <option value="200">200 righe</option>
          </select>
        </div>
        <pre id="logs" class="logs"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
